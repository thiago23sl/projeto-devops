name: CI/CD

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar GCC
        run: sudo apt update && sudo apt install gcc -y

      - name: Compilar projeto
        run: gcc main.c -o biblioteca

      - name: Compilar testes
        run: gcc test.c -o test

      - name: Rodar testes
        run: ./test

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Compilar binário
        run: gcc main.c -o biblioteca

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: programa-biblioteca
          path: biblioteca

      - name: Enviar alerta para Discord
        if: always()
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚀 Pipeline executado!\nStatus: ${{ job.status }}\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}