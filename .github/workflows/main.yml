name: CI/CD

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar GCC
        run: sudo apt update && sudo apt install gcc -y

      - name: Compilar projeto
        run: gcc main.c -o biblioteca

  deploy:
    runs-on: ubuntu-latest
    needs: build   # 🔥 ISSO LIGA OS DOIS

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Compilar binário
        run: gcc main.c -o biblioteca

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: programa-biblioteca
          path: biblioteca
